<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | 2B Tex</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#101820;color:#071426;font-family:"Segoe UI",Tahoma,sans-serif}.login-card{width:min(92vw,430px);background:#fff;border-radius:8px;padding:28px;box-shadow:0 24px 70px rgba(0,0,0,.28)}.brand{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px}.brand img{width:118px;height:auto}.brand h1{margin:0;font-size:24px;color:#071426}.brand p{margin:6px 0 0;color:#667085}label{display:block;margin:14px 0}span{display:block;margin-bottom:7px;font-weight:700;color:#344054}input{width:100%;border:1px solid #d0d5dd;border-radius:8px;padding:13px 14px;font-size:17px}button{width:100%;border:0;border-radius:8px;padding:14px 16px;background:#071426;color:#fff;font-size:18px;font-weight:800;cursor:pointer;margin-top:10px}.error{display:none;margin-top:14px;color:#b42318;background:#fef3f2;border:1px solid #fecdca;border-radius:8px;padding:10px}.hint{margin-top:18px;color:#667085;font-size:14px;text-align:center}
  </style>
</head>
<body>
  <main class="login-card">
    <div class="brand">
      <div>
        <h1>تسجيل الدخول</h1>
        <p>نظام تشغيل 2B Tex</p>
      </div>
      <img src="./2b-mark.svg" alt="2B Tex">
    </div>
    <form id="loginForm">
      <label><span>اسم الدخول</span><input id="username" autocomplete="username" required autofocus></label>
      <label><span>كلمة المرور</span><input id="password" type="password" autocomplete="current-password" required></label>
      <button type="submit">دخول النظام</button>
      <div class="error" id="loginError"></div>
    </form>
    <p class="hint">استخدم بيانات المستخدم المسجلة داخل النظام.</p>
  </main>
  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('loginError');
    fetch('/api/auth/me', { cache:'no-store' }).then((response)=>{ if (response.ok) location.replace('/'); }).catch(()=>{});
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.style.display = 'none';
      const button = form.querySelector('button');
      button.disabled = true;
      button.textContent = 'جاري الدخول...';
      try {
        const response = await fetch('/api/auth/login', {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body:JSON.stringify({ username:document.getElementById('username').value, password:document.getElementById('password').value })
        });
        const data = await response.json().catch(()=>({}));
        if (!response.ok) throw new Error(data.error || 'تعذر تسجيل الدخول');
        location.replace('/');
      } catch (error) {
        errorBox.textContent = error.message || 'تعذر تسجيل الدخول';
        errorBox.style.display = 'block';
      } finally {
        button.disabled = false;
        button.textContent = 'دخول النظام';
      }
    });
  </script>
</body>
</html>
